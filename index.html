<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unblocked Games Hub</title>
    <!-- Tailwind Play CDN for easy styling without build step -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: white;
        }
        .selection-emerald::selection {
            background-color: rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body class="selection-emerald">
    <div id="root" class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="sticky top-0 z-40 bg-[#0a0a0a]/80 backdrop-blur-md border-b border-white/10">
            <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between gap-4">
                <div class="flex items-center gap-2 cursor-pointer group" onclick="location.reload()">
                    <div class="p-2 bg-emerald-500 rounded-lg group-hover:rotate-12 transition-transform">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-black"><line x1="6" y1="12" x2="10" y2="12"></line><line x1="8" y1="10" x2="8" y2="14"></line><line x1="15" y1="13" x2="15.01" y2="13"></line><line x1="18" y1="11" x2="18.01" y2="11"></line><rect x="2" y="6" width="20" height="12" rx="2"></rect></svg>
                    </div>
                    <h1 class="text-xl font-bold tracking-tight hidden sm:block">
                        UNBLOCKED<span class="text-emerald-500">GAMES</span>
                    </h1>
                </div>

                <div class="flex-1 max-w-md relative">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3 top-1/2 -translate-y-1/2 text-white/40"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input
                        id="search-input"
                        type="text"
                        placeholder="Search games..."
                        class="w-full bg-white/5 border border-white/10 rounded-xl py-2 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50 transition-all"
                    />
                </div>

                <div class="flex items-center gap-4">
                    <button class="text-sm font-medium text-white/60 hover:text-white transition-colors">
                        Request Game
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 py-8 flex-1">
            <div id="hub-view">
                <div class="mb-8">
                    <h2 class="text-3xl font-bold mb-2">Featured Games</h2>
                    <p class="text-white/40">Hand-picked unblocked games for your entertainment.</p>
                </div>

                <div id="game-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    <!-- Games will be injected here -->
                </div>
            </div>
        </main>

        <!-- Player Overlay -->
        <div id="player-overlay" class="fixed inset-0 z-50 bg-[#0a0a0a] flex flex-col hidden">
            <div class="h-16 border-b border-white/10 flex items-center justify-between px-4 bg-[#0a0a0a]">
                <div class="flex items-center gap-4">
                    <button id="back-btn" class="p-2 hover:bg-white/10 rounded-lg transition-colors flex items-center gap-2 text-white/60 hover:text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        <span class="hidden sm:inline">Back to Hub</span>
                    </button>
                    <div class="h-6 w-px bg-white/10"></div>
                    <h2 id="game-title" class="font-bold text-lg">Game Title</h2>
                </div>
                
                <div class="flex items-center gap-2">
                    <button id="close-btn" class="p-2 hover:bg-red-500/20 text-white/60 hover:text-red-500 rounded-lg transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
            </div>
            <div class="flex-1 bg-black relative">
                <iframe id="game-frame" src="" class="w-full h-full border-none" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
            </div>
        </div>

        <!-- Footer -->
        <footer class="border-t border-white/10 py-12 mt-12 bg-white/[0.02]">
            <div class="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-8">
                <div class="flex items-center gap-2">
                    <div class="p-1.5 bg-emerald-500 rounded-md">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-black"><line x1="6" y1="12" x2="10" y2="12"></line><line x1="8" y1="10" x2="8" y2="14"></line><line x1="15" y1="13" x2="15.01" y2="13"></line><line x1="18" y1="11" x2="18.01" y2="11"></line><rect x="2" y="6" width="20" height="12" rx="2"></rect></svg>
                    </div>
                    <span class="font-bold tracking-tight uppercase">Unblocked Games</span>
                </div>
                
                <div class="flex gap-8 text-sm text-white/40">
                    <a href="#" class="hover:text-white transition-colors">Terms</a>
                    <a href="#" class="hover:text-white transition-colors">Privacy</a>
                    <a href="#" class="hover:text-white transition-colors">Contact</a>
                    <a href="#" class="hover:text-white transition-colors">DMCA</a>
                </div>

                <p class="text-sm text-white/20">
                    © 2026 Unblocked Games Hub. All rights reserved.
                </p>
            </div>
        </footer>
    </div>
    <script src="./src/main.js"></script>
</body>
</html>
